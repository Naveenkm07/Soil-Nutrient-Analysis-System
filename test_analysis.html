<!DOCTYPE html>
<html>
<head>
    <title>Test Analysis</title>
</head>
<body>
    <h1>Testing Analysis Functionality</h1>

        <label>Region: <input type="text" name="region" value="Test Region"></label><br>
        <label>Nitrogen: <input type="number" name="nitrogen" value="30"></label><br>

        <label>pH: <input type="number" name="ph" value="5.5" step="0.1"></label><br>
        <button type="submit">Test Analysis</button>
    </form>
</body>
</html>
